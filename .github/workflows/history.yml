name: Compute History — Monthly Snapshots

# Manual + monthly cron.  Reads pbf_analyse/history-list.json from the
# Osm-python-analyse_Belgium repo (generated by the daily extract
# workflow) and computes stats for every entry via
# scripts/compute_history.py.
#
# The output (history.json) is committed back to main so evolution.html
# can read it via raw.githubusercontent.com.
#
# Two modes:
#   - mode=full      → recompute everything listed in history-list.json.
#   - mode=update    → only compute entries not yet in history.json.
#                      The "daily" entry (Brussels-daily.pbf) is ALWAYS
#                      recomputed regardless of mode, since its content
#                      changes twice a day even though its date stays
#                      "today".

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "full = recompute everything, update = add only missing months + refresh daily"
        required: true
        default: "update"
        type: choice
        options:
          - update
          - full
  schedule:
    # 1st of each month at 04:00 UTC — picks up the new monthly snapshot.
    - cron: "0 4 1 * *"

env:
  HISTORY_LIST_URL: https://raw.githubusercontent.com/PasLoin/Osm-python-analyse_Belgium/main/pbf_analyse/history-list.json
  # Path of the output file, relative to this repo's root.
  HISTORY_JSON_PATH: history.json

jobs:
  history:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jq osmium-tool

      - name: Install Python dependencies
        run: pip install pyosmium pyproj --break-system-packages

      # ── Load existing history.json (update mode) or start fresh (full mode) ──
      - name: Load or initialise history.json
        run: |
          if [[ "${{ inputs.mode }}" == "full" ]]; then
            echo "Full rebuild requested — starting from empty history.json"
            echo "[]" > history.json
          elif [[ -f "${HISTORY_JSON_PATH}" ]]; then
            echo "Found existing ${HISTORY_JSON_PATH} in repo, using it as base."
            cp "${HISTORY_JSON_PATH}" history.json
            if ! jq empty history.json 2>/dev/null; then
              echo "Existing history.json invalid — restarting from empty."
              echo "[]" > history.json
            fi
          else
            echo "No existing ${HISTORY_JSON_PATH} found — starting from empty."
            echo "[]" > history.json
          fi

      # ── Fetch the upstream snapshot/daily index ────────────────────────
      - name: Fetch history-list.json from upstream
        run: |
          echo "→ Fetching ${HISTORY_LIST_URL}"
          curl -fsSL "${HISTORY_LIST_URL}" -o history-list.json
          jq 'length' history-list.json
          jq -c '.[]' history-list.json

      # ── Process each entry (snapshot or daily) ─────────────────────────
      - name: Compute stats for new/changed entries
        run: |
          set -euo pipefail
          existing_dates=$(jq -r '.[].date' history.json 2>/dev/null || true)

          jq -c '.[]' history-list.json | while IFS= read -r entry; do
            iso=$(jq -r '.date' <<< "$entry")
            fname=$(jq -r '.filename' <<< "$entry")
            url=$(jq -r '.url' <<< "$entry")
            etype=$(jq -r '.type' <<< "$entry")

            already_have=false
            if echo "$existing_dates" | grep -qx "$iso"; then
              already_have=true
            fi

            # The "daily" entry always gets refreshed (same date, new content),
            # even in update mode and even if already present.
            if [[ "$already_have" == "true" && "$etype" != "daily" ]]; then
              echo "✓ already have $iso ($fname), skipping"
              continue
            fi

            echo "→ downloading $url"
            if curl -fsSL "$url" -o snapshot.pbf; then
              echo "  computing stats for $iso ($etype: $fname)"
              python3 scripts/compute_history.py snapshot.pbf "$iso" \
                > snapshot_stats.json

              # Attach metadata about the source entry (filename + type)
              # so evolution.html can e.g. style the "daily" point differently.
              jq --arg fname "$fname" --arg etype "$etype" \
                '. + {filename: $fname, type: $etype}' \
                snapshot_stats.json > snapshot_stats_enriched.json

              jq --argjson new "$(cat snapshot_stats_enriched.json)" '
                (map(select(.date != $new.date))) + [$new]
                | sort_by(.date)
              ' history.json > history_new.json
              mv history_new.json history.json

              rm -f snapshot.pbf snapshot_stats.json snapshot_stats_enriched.json
            else
              echo "  ⚠ $url not available, skipping"
            fi
          done

          echo "── Final history.json summary ──"
          jq 'length' history.json
          jq -c '.[] | {date, type}' history.json

      - name: Upload history.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: history-json
          path: history.json
          retention-days: 90

      # ── Commit history.json back to main ──────────────────────────────
      - name: Commit history.json
        run: |
          cp history.json "${HISTORY_JSON_PATH}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${HISTORY_JSON_PATH}"
          if git diff --cached --quiet; then
            echo "history.json unchanged, nothing to commit."
          else
            git commit -m "history: update snapshot data"
            git push
          fi
