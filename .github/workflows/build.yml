name: Build & Deploy PMTiles

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "index.html"
      - "style.json"
  workflow_dispatch:

env:
  HIGHWAY_TYPES: >-
    w/highway=footway
    w/highway=pedestrian
    w/highway=path
    w/highway=living_street
    w/highway=steps
    w/highway=elevator
    w/highway=cycleway
    n/highway=elevator
    n/highway=crossing
    n/amenity=elevator
  OSM_PBF_URL: https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region-latest.osm.pbf
  OSM_STATE_URL: https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region.state.txt
  MIN_ZOOM: 8
  MAX_ZOOM: 19
  SHORT_GAP_MAX: 30
  LONG_GAP_MAX: 150

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install osmium-tool, tippecanoe & jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends osmium-tool tippecanoe jq

      - name: Install Python deps
        run: pip install geopandas shapely --break-system-packages

      - name: Download OSM PBF
        run: |
          wget -O brussels.osm.pbf "$OSM_PBF_URL"
          wget -O state.txt "$OSM_STATE_URL"

      - name: Filter highway features
        run: |
          osmium tags-filter brussels.osm.pbf \
            ${{ env.HIGHWAY_TYPES }} \
            -o highways_raw.osm.pbf --overwrite

      - name: Filter landuse features
        run: |
          osmium tags-filter brussels.osm.pbf \
            a/landuse \
            -o landuse_raw.osm.pbf --overwrite

      - name: Export highways GeoJSON
        run: |
          osmium export highways_raw.osm.pbf \
            --geometry-types=linestring,point \
            -o highways.geojson --overwrite

      - name: Export landuse GeoJSON
        run: |
          osmium export landuse_raw.osm.pbf \
            --geometry-types=polygon \
            -o landuse.geojson --overwrite

      - name: Force elevators visible
        run: |
          jq '(.features[] | select(.properties.highway == "elevator" or .properties.amenity == "elevator")) |= . + {"tippecanoe": {"minzoom": 8}}' \
            highways.geojson > highways_fixed.geojson
          mv highways_fixed.geojson highways.geojson

      - name: Compute network gaps
        run: |
          python3 << 'EOF'
          import time, os
          import geopandas as gpd
          from shapely.geometry import LineString, Point
          from shapely.strtree import STRtree
          from collections import Counter, defaultdict

          SHORT_MAX = int(os.environ.get("SHORT_GAP_MAX", 30))
          LONG_MAX  = int(os.environ.get("LONG_GAP_MAX", 150))
          t0 = time.time()

          print("Chargement des données...")
          full_gdf = gpd.read_file("highways.geojson").to_crs("EPSG:31370")
          
          lines = full_gdf[full_gdf.geometry.geom_type == "LineString"].reset_index(drop=True)
          crossings = full_gdf[full_gdf["highway"] == "crossing"].reset_index(drop=True)
          
          print(f"Lignes: {len(lines)}, Crossings nodes: {len(crossings)}")

          all_pts = []
          endpoint_to_lines = defaultdict(set)
          for idx, geom in enumerate(lines.geometry):
              coords = list(geom.coords)
              if len(coords) < 2: continue
              s, e = tuple(coords[0]), tuple(coords[-1])
              all_pts += [s, e]
              endpoint_to_lines[s].add(idx)
              endpoint_to_lines[e].add(idx)

          counts = Counter(all_pts)
          dangling_coords = [p for p, c in counts.items() if c == 1]
          dangling = [(Point(p), endpoint_to_lines[p]) for p in dangling_coords]

          line_tree = STRtree(list(lines.geometry))
          crossing_tree = STRtree(list(crossings.geometry))

          gaps_short, gaps_long = [], []

          for i, (pt, own_lines) in enumerate(dangling):
              best_dist = float("inf")
              target_pt = None
              found_via_crossing = False

              near_crossing_idx = crossing_tree.query(pt.buffer(SHORT_MAX))
              if len(near_crossing_idx) > 0:
                  for c_idx in near_crossing_idx:
                      c_pt = crossings.geometry.iloc[c_idx]
                      d = pt.distance(c_pt)
                      if d < best_dist:
                          best_dist = d
                          target_pt = c_pt
                          found_via_crossing = True
              
              if target_pt is None:
                  candidates_idx = [idx for idx in line_tree.query(pt.buffer(LONG_MAX)) if idx not in own_lines]
                  for l_idx in candidates_idx:
                      line = lines.geometry.iloc[l_idx]
                      d = pt.distance(line)
                      if d < best_dist:
                          best_dist = d
                          target_pt = line.interpolate(line.project(pt))

              if target_pt and 0.1 < best_dist <= LONG_MAX:
                  gap = LineString([pt, target_pt])
                  props = {"distance_m": round(best_dist, 1), "to_crossing": 1 if found_via_crossing else 0}
                  if best_dist <= SHORT_MAX:
                      gaps_short.append({"geometry": gap, **props})
                  else:
                      gaps_long.append({"geometry": gap, **props})

          def save(features, filename):
              rows = features if features else [{"geometry": None, "distance_m": 0, "to_crossing": 0}]
              g = gpd.GeoDataFrame(rows, crs="EPSG:31370")
              g.to_crs("EPSG:4326").to_file(filename, driver="GeoJSON")

          save(gaps_short, "gaps_short.geojson")
          save(gaps_long,  "gaps_long.geojson")
          print(f"Calcul terminé en {time.time()-t0:.1f}s")
          EOF

      - name: Build PMTiles with tippecanoe
        run: |
          tippecanoe \
            -o pedestrian.pmtiles \
            --force \
            --name "Brussels Pedestrian Network" \
            --attribution "© OpenStreetMap contributors" \
            -Z${{ env.MIN_ZOOM }} -z${{ env.MAX_ZOOM }} \
            --no-feature-limit \
            --no-tile-size-limit \
            --extend-zooms-if-still-dropping \
            --drop-densest-as-needed \
            highways.geojson \
            landuse.geojson \
            gaps_short.geojson \
            gaps_long.geojson

      - name: Prepare site
        run: |
          mv pedestrian.pmtiles pedestrian.pmtiles.gz
          mkdir -p _site
          cp index.html style.json state.txt pedestrian.pmtiles.gz _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: update pedestrian map and network gaps"
