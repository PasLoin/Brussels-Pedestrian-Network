name: Build & Deploy PMTiles

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "scripts/**"
      - "index.html"
      - "style.json"
  workflow_dispatch:

# ─── Highway type filters ────────────────────────────────────────────────────
# HIGHWAY_TYPES_PED:     types included in the *visual* pedestrian layer.
# HIGHWAY_TYPES_ROUTING: superset used for building the routing graph
#                        (includes roads that pedestrians may have to walk on).
env:
  HIGHWAY_TYPES_PED: >-
    w/highway=footway
    w/highway=pedestrian
    w/highway=path
    w/highway=living_street
    w/highway=steps
    w/highway=elevator
    w/highway=cycleway
    n/highway=elevator
    n/highway=crossing
    n/amenity=elevator

  HIGHWAY_TYPES_ROUTING: >-
    w/highway=footway
    w/highway=pedestrian
    w/highway=path
    w/highway=living_street
    w/highway=steps
    w/highway=elevator
    w/highway=cycleway
    w/highway=residential
    w/highway=service
    w/highway=unclassified
    w/highway=tertiary
    w/highway=tertiary_link
    w/highway=secondary
    w/highway=secondary_link
    w/highway=primary
    w/highway=primary_link
    w/foot=yes
    w/foot=designated
    n/highway=elevator
    n/highway=crossing
    n/amenity=elevator

  OSM_PBF_URL: https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region-latest.osm.pbf
  OSM_STATE_URL: https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region.state.txt

  # ── Tippecanoe zoom levels ──────────────────────────────────────────────
  MIN_ZOOM: 9
  MAX_ZOOM: 19

  # ── Origin-Destination sampling ─────────────────────────────────────────
  MIN_OD_DISTANCE_M: 300       # min straight-line distance between OD pair
  MAX_OD_DISTANCE_KM: 6        # max straight-line distance (km)
  MAX_OD_PAIRS: 900000         # cap on total OD pairs generated
  TOP_RANK_PCT: 15             # top N% of flow edges flagged as "forced"
  MIN_FLOW_THRESHOLD: 5        # drop flow edges with fewer trips from PMTiles
  POINTS_PER_SIDE: 5           # legacy fallback (used when OD_SAMPLE_INTERVAL_M=0)
  OD_SAMPLE_INTERVAL_M: 100    # one OD point per N metres per side of street

  # ── Walkability score tuning ────────────────────────────────────────────
  WALK_SCORE_RADIUS_M: 1000    # only first/last N metres of each trip count
  SIDEWALK_PENALTY_NONE: 0.3   # multiplier when street has sidewalk=no
  SIDEWALK_PENALTY_PARTIAL: 0.6 # multiplier when sidewalk on one side only
  SIDEWALK_PENALTY_UNKNOWN: 0.5 # multiplier when no sidewalk tag on road edges

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Setup ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends osmium-tool tippecanoe jq

      - name: Install Python dependencies
        run: pip install "shapely>=2" osmnx geopandas igraph numpy pyproj --break-system-packages

      # ── Download OSM data ───────────────────────────────────────────────
      - name: Download OSM PBF
        run: |
          wget -O brussels.osm.pbf "$OSM_PBF_URL"
          wget -O state.txt "$OSM_STATE_URL"

      # ── Extract pedestrian features (visual layer) ──────────────────────
      - name: Filter pedestrian features
        run: |
          osmium tags-filter brussels.osm.pbf \
            ${{ env.HIGHWAY_TYPES_PED }} \
            -o highways_ped.osm.pbf --overwrite

      - name: Export pedestrian GeoJSON
        run: |
          osmium export highways_ped.osm.pbf \
            --geometry-types=linestring,point \
            -o highways.geojson --overwrite

      - name: Force elevators visible at low zoom
        run: |
          jq '(.features[] | select(
            .properties.highway == "elevator" or
            .properties.amenity == "elevator"
          )) |= . + {"tippecanoe": {"minzoom": 9}}' \
            highways.geojson > highways_fixed.geojson
          mv highways_fixed.geojson highways.geojson

      # ── Extract address features (OD sampling) ─────────────────────────
      - name: Filter address features
        run: |
          osmium tags-filter brussels.osm.pbf \
            nw/addr:housenumber \
            -o addresses_raw.osm.pbf --overwrite

      - name: Export addresses GeoJSON
        run: |
          osmium export addresses_raw.osm.pbf \
            --geometry-types=point,polygon \
            -o addresses.geojson --overwrite

      # ── Extract routing features ────────────────────────────────────────
      - name: Filter routing features
        run: |
          osmium tags-filter brussels.osm.pbf \
            ${{ env.HIGHWAY_TYPES_ROUTING }} \
            -o routing_raw.osm.pbf --overwrite

      - name: Convert routing PBF to OSM XML
        run: |
          osmium cat routing_raw.osm.pbf -o routing_raw.osm --overwrite

      # ── Run the pedestrian routing pipeline ─────────────────────────────
      - name: Compute pedestrian routing flows
        env:
          PYTHONPATH: scripts
        run: python3 scripts/main.py

      # ── Debug ───────────────────────────────────────────────────────────
      - name: Debug snapping (Avenue de Messidor)
        if: always()
        env:
          PYTHONPATH: scripts
        run: python3 scripts/debug_snap.py "Avenue de Messidor - Messidorlaan"

      # ── Debug & artifacts ───────────────────────────────────────────────
      - name: List generated files (debug)
        if: always()
        run: |
          echo "=== Files in workspace ==="
          ls -lh *.geojson stats.json graph.json 2>/dev/null || echo "No files found"

      - name: Upload GeoJSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geojson-outputs
          path: |
            flow_edges.geojson
            forced_segments.geojson
            forced_cycleway.geojson
            street_scores.geojson
            highways.geojson
            addresses.geojson
            stats.json
            graph.json
          retention-days: 30
          if-no-files-found: warn

      # ── Build tile archive ──────────────────────────────────────────────
      - name: Build PMTiles with tippecanoe
        run: |
          tippecanoe \
            -o pedestrian.pmtiles \
            --force \
            --name "Brussels Pedestrian Network" \
            --attribution "© OpenStreetMap contributors" \
            -Z${{ env.MIN_ZOOM }} -z${{ env.MAX_ZOOM }} \
            --extend-zooms-if-still-dropping \
            --drop-densest-as-needed \
            --named-layer=highways:highways.geojson \
            --named-layer=flow_edges:flow_edges.geojson \
            --named-layer=forced_segments:forced_segments.geojson \
            --named-layer=forced_cycleway:forced_cycleway.geojson \
            --named-layer=street_scores:street_scores.geojson

      # ── Deploy ──────────────────────────────────────────────────────────
      - name: Prepare site
        run: |
          mv pedestrian.pmtiles pedestrian.pmtiles.gz
          mkdir -p _site
          cp index.html style.json state.txt stats.json graph.json pedestrian.pmtiles.gz _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: update pedestrian routing flows"
