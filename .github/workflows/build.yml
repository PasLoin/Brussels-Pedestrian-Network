name: Build & Deploy PMTiles

on:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 3:00 UTC
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "index.html"
      - "style.json"
  workflow_dispatch:

# ──────────────────────────────────────────────
# Configurable highway types — edit as needed
# ──────────────────────────────────────────────
env:
  HIGHWAY_TYPES: >-
    w/highway=footway
    w/highway=pedestrian
    w/highway=path
    w/highway=living_street
    w/highway=steps
    w/highway=elevator
    w/highway=cycleway
    n/highway=elevator
    n/highway=crossing
  OSM_PBF_URL: https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region-latest.osm.pbf
  OSM_STATE_URL: https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region.state.txt
  MIN_ZOOM: 8
  MAX_ZOOM: 19
  SHORT_GAP_MAX: 30    # mètres — gap facile à combler
  LONG_GAP_MAX: 150    # mètres — gap plus long

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Install tools ───────────────────────
      - name: Install osmium-tool, tippecanoe & jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends osmium-tool tippecanoe jq

      - name: Install Python deps
        run: pip install geopandas shapely --break-system-packages

      # ── Download OSM extract ────────────────
      - name: Download OSM PBF
        run: |
          wget -O brussels.osm.pbf "$OSM_PBF_URL"
          wget -O state.txt "$OSM_STATE_URL"
          echo "PBF size: $(du -sh brussels.osm.pbf | cut -f1)"

      # ── Filter data ─────────────────────────
      - name: Filter highway features
        run: |
          osmium tags-filter brussels.osm.pbf \
            ${{ env.HIGHWAY_TYPES }} \
            -o highways_raw.osm.pbf --overwrite
          echo "Highways PBF: $(du -sh highways_raw.osm.pbf | cut -f1)"

      - name: Filter landuse features
        run: |
          osmium tags-filter brussels.osm.pbf \
            a/landuse \
            -o landuse_raw.osm.pbf --overwrite
          echo "Landuse PBF: $(du -sh landuse_raw.osm.pbf | cut -f1)"

      # ── Export to GeoJSON ───────────────────
      - name: Export highways GeoJSON
        run: |
          osmium export highways_raw.osm.pbf \
            --geometry-types=linestring,point \
            -o highways.geojson --overwrite
          echo "highways.geojson: $(du -sh highways.geojson | cut -f1)"

      - name: Export landuse GeoJSON
        run: |
          osmium export landuse_raw.osm.pbf \
            --geometry-types=polygon \
            -o landuse.geojson --overwrite
          echo "landuse.geojson: $(du -sh landuse.geojson | cut -f1)"

      # ── Force elevators visible at all zooms ─
      - name: Force elevators visible at all zooms
        run: |
          jq '(.features[] | select(.properties.highway == "elevator")) |= . + {"tippecanoe": {"minzoom": 8}}' \
            highways.geojson > highways_fixed.geojson
          mv highways_fixed.geojson highways.geojson

      # ── Compute network gaps (STRtree) ───────
      - name: Compute network gaps
        run: |
          python3 << 'EOF'
          import time, os
          import geopandas as gpd
          from shapely.geometry import LineString, Point
          from shapely.strtree import STRtree
          from collections import Counter, defaultdict

          SHORT_MAX = int(os.environ.get("SHORT_GAP_MAX", 30))
          LONG_MAX  = int(os.environ.get("LONG_GAP_MAX",  150))

          t0 = time.time()

          # ── Chargement en Lambert belge (métrique) ────────────────────────
          print("Chargement highways.geojson...")
          gdf = gpd.read_file("highways.geojson")
          gdf = gdf[gdf.geometry.geom_type == "LineString"].to_crs("EPSG:31370").reset_index(drop=True)
          print(f"  {len(gdf)} lignes — {time.time()-t0:.1f}s")

          geom_list = list(gdf.geometry)

          # ── Endpoints pendants + mapping coords → indices de lignes ──────
          print("Calcul des endpoints...")
          all_pts = []
          endpoint_to_lines = defaultdict(set)
          for idx, geom in enumerate(geom_list):
              coords = list(geom.coords)
              s, e = tuple(coords[0]), tuple(coords[-1])
              all_pts += [s, e]
              endpoint_to_lines[s].add(idx)
              endpoint_to_lines[e].add(idx)

          counts = Counter(all_pts)
          # Pendants = extrémités libres (apparaissent une seule fois)
          dangling_coords = [p for p, c in counts.items() if c == 1]
          dangling = [(Point(p), endpoint_to_lines[p]) for p in dangling_coords]
          print(f"  {len(dangling)} endpoints pendants — {time.time()-t0:.1f}s")

          # ── Index spatial STRtree ─────────────────────────────────────────
          print("Construction du STRtree...")
          tree = STRtree(geom_list)
          print(f"  STRtree prêt — {time.time()-t0:.1f}s")

          # ── Calcul des gaps ───────────────────────────────────────────────
          print("Calcul des gaps...")
          gaps_short, gaps_long = [], []
          skipped = 0

          for i, (pt, own_lines) in enumerate(dangling):
              if i % 2000 == 0:
                  print(f"  {i}/{len(dangling)} — {time.time()-t0:.1f}s")

              # Candidats dans le rayon, en excluant les lignes de l'endpoint
              candidates_idx = [
                  idx for idx in tree.query(pt.buffer(LONG_MAX))
                  if idx not in own_lines
              ]
              if not candidates_idx:
                  skipped += 1
                  continue

              best_dist = float("inf")
              best_pt   = None
              for idx in candidates_idx:
                  line = geom_list[idx]
                  d = pt.distance(line)
                  if d < best_dist:
                      best_dist = d
                      best_pt   = line.interpolate(line.project(pt))

              if best_dist > LONG_MAX:
                  skipped += 1
                  continue

              props = {"distance_m": round(best_dist, 1)}
              gap   = LineString([pt, best_pt])
              if best_dist <= SHORT_MAX:
                  gaps_short.append({"geometry": gap, **props})
              else:
                  gaps_long.append({"geometry": gap, **props})

          print(f"Gaps courts (<{SHORT_MAX}m) : {len(gaps_short)}")
          print(f"Gaps longs  (<{LONG_MAX}m)  : {len(gaps_long)}")
          print(f"Ignorés (hors portée)       : {skipped}")
          print(f"Durée totale : {time.time()-t0:.1f}s")

          # ── Sauvegarde ────────────────────────────────────────────────────
          def save(features, filename):
              rows = features if features else [{"geometry": None, "distance_m": 0}]
              g = gpd.GeoDataFrame(rows, crs="EPSG:31370")
              g.to_crs("EPSG:4326").to_file(filename, driver="GeoJSON")
              import subprocess
              print(" ", subprocess.run(["du", "-sh", filename], capture_output=True, text=True).stdout.strip())

          save(gaps_short, "gaps_short.geojson")
          save(gaps_long,  "gaps_long.geojson")
          EOF

      # ── Build PMTiles ───────────────────────
      - name: Build PMTiles with tippecanoe
        run: |
          tippecanoe \
            -o pedestrian.pmtiles \
            --force \
            --name "Brussels Pedestrian Network" \
            --description "Pedestrian, cycling and shared streets of Brussels" \
            --attribution "© OpenStreetMap contributors" \
            -Z${{ env.MIN_ZOOM }} -z${{ env.MAX_ZOOM }} \
            --no-feature-limit \
            --no-tile-size-limit \
            --extend-zooms-if-still-dropping \
            --drop-densest-as-needed \
            highways.geojson \
            landuse.geojson \
            gaps_short.geojson \
            gaps_long.geojson
          echo "PMTiles: $(du -sh pedestrian.pmtiles | cut -f1)"

      # ── GitHub Pages workaround ─────────────
      - name: Rename PMTiles
        run: |
          mv pedestrian.pmtiles pedestrian.pmtiles.gz

      # ── Assemble site ───────────────────────
      - name: Prepare _site directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp style.json _site/
          cp state.txt _site/
          cp pedestrian.pmtiles.gz _site/
          echo "📦 Site contents:"
          ls -lh _site/

      # ── Deploy ──────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: update pedestrian map"
