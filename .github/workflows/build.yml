name: Build & Deploy PMTiles

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "scripts/**"
      - "index.html"
      - "stats.html"
      - "evolution.html"
      - "about.html"
      - "robots.txt"
      - "sitemap.xml"
      - "favicon.svg"
      - "app.js"
      - "app.css"
      - "style.json"
  workflow_dispatch:

# ─── Highway type filters ────────────────────────────────────────────────────
env:
  HIGHWAY_TYPES_PED: >-
    w/highway=footway
    w/highway=pedestrian
    w/highway=path
    w/highway=living_street
    w/highway=steps
    w/highway=elevator
    w/highway=cycleway
    n/highway=elevator
    n/highway=crossing
    n/amenity=elevator

  HIGHWAY_TYPES_ROUTING: >-
    w/highway=footway
    w/highway=pedestrian
    w/highway=path
    w/highway=living_street
    w/highway=steps
    w/highway=elevator
    w/highway=cycleway
    w/highway=residential
    w/highway=service
    w/highway=unclassified
    w/highway=tertiary
    w/highway=tertiary_link
    w/highway=secondary
    w/highway=secondary_link
    w/highway=primary
    w/highway=primary_link
    w/foot=yes
    w/foot=designated
    n/highway=elevator
    n/highway=crossing
    n/amenity=elevator

  HIGHWAY_TYPES_ROADS: >-
    w/highway=residential
    w/highway=unclassified
    w/highway=tertiary
    w/highway=tertiary_link
    w/highway=secondary
    w/highway=secondary_link
    w/highway=primary
    w/highway=primary_link

  OSM_PBF_URL: https://raw.githubusercontent.com/PasLoin/Osm-python-analyse_Belgium/main/pbf_analyse/history/Brussels-daily.pbf
  OSM_STATE_URL: https://raw.githubusercontent.com/PasLoin/Osm-python-analyse_Belgium/main/pbf_analyse/history/state.txt

  MIN_ZOOM: 9
  MAX_ZOOM: 19

  MIN_OD_DISTANCE_M: 600
  MAX_OD_DISTANCE_KM: 2
  MAX_OD_PAIRS: 900000
  TOP_RANK_PCT: 15
  MIN_FLOW_THRESHOLD: 5
  POINTS_PER_SIDE: 5
  OD_SAMPLE_INTERVAL_M: 100

  WALK_SCORE_RADIUS_M: 1000
  SIDEWALK_PENALTY_NONE: 0.3
  SIDEWALK_PENALTY_PARTIAL: 0.6
  SIDEWALK_PENALTY_UNKNOWN: 0.5

  SIDEWALK_GAP_OFFSET_M: 7
  SIDEWALK_GAP_SEARCH_M: 7
  SIDEWALK_GAP_MAX_ANGLE: 65
  SIDEWALK_GAP_MIN_COVERAGE: 0.4

  CROSSING_NODE_ROAD_SEARCH_M:  20
  CROSSING_WAY_SEARCH_RADIUS_M: 20
  CROSSING_NODE_CONNECTED_M:     3
  CROSSING_SIDEWALK_OFFSET_M:    7
  CROSSING_SIDEWALK_SEARCH_M:   15
  CROSSING_SIDEWALK_MAX_ANGLE:  40

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends osmium-tool tippecanoe jq

      - name: Install Python dependencies
        run: pip install "shapely>=2" osmnx geopandas igraph numpy pyproj --break-system-packages

      - name: Download OSM PBF
        run: |
          wget -O brussels.osm.pbf "$OSM_PBF_URL"
          wget -O state.txt "$OSM_STATE_URL"

      - name: Filter pedestrian features
        run: |
          osmium tags-filter brussels.osm.pbf \
            ${{ env.HIGHWAY_TYPES_PED }} \
            -o highways_ped.osm.pbf --overwrite

      - name: Export pedestrian GeoJSON
        run: |
          osmium export highways_ped.osm.pbf \
            --geometry-types=linestring,point \
            -o highways.geojson --overwrite

      - name: Force elevators visible at low zoom
        run: |
          jq '(.features[] | select(
            .properties.highway == "elevator" or
            .properties.amenity == "elevator"
          )) |= . + {"tippecanoe": {"minzoom": 9}}' \
            highways.geojson > highways_fixed.geojson
          mv highways_fixed.geojson highways.geojson

      - name: Slim highways GeoJSON properties
        run: |
          jq '
            .features |= map(
              .properties |= {
                highway:    .highway,
                amenity:    .amenity,
                name:       .name,
                foot:       .foot,
                bicycle:    .bicycle,
                access:     .access,
                segregated: .segregated,
                "crossing:continuous": .["crossing:continuous"]
              }
              | with_entries(select(.value != null and .value != ""))
            )
          ' highways.geojson > highways_slim.geojson
          mv highways_slim.geojson highways.geojson

      - name: Filter address features
        run: |
          osmium tags-filter brussels.osm.pbf \
            nw/addr:housenumber \
            -o addresses_raw.osm.pbf --overwrite

      - name: Export addresses GeoJSON
        run: |
          osmium export addresses_raw.osm.pbf \
            --geometry-types=point,polygon \
            -o addresses.geojson --overwrite

      - name: Export road ways for sidewalk analysis
        run: |
          osmium tags-filter brussels.osm.pbf \
            ${{ env.HIGHWAY_TYPES_ROADS }} \
            -o roads_sidewalk.osm.pbf --overwrite
          osmium export roads_sidewalk.osm.pbf \
            --geometry-types=linestring \
            -o sidewalk_roads_raw.geojson --overwrite

      - name: Export footways for sidewalk gap detection
        run: |
          osmium tags-filter brussels.osm.pbf \
            w/highway=footway w/highway=pedestrian \
            -o footways_sidewalk.osm.pbf --overwrite
          osmium export footways_sidewalk.osm.pbf \
            --geometry-types=linestring \
            -o sidewalk_footways_raw.geojson --overwrite

      - name: Export excluded ways for crossing exclusion
        run: |
          osmium tags-filter brussels.osm.pbf w/highway=service \
            -o service_roads.osm.pbf --overwrite
          osmium export service_roads.osm.pbf --geometry-types=linestring \
            -o service_roads_raw.geojson --overwrite

          osmium tags-filter brussels.osm.pbf w/highway=cycleway \
            -o cycleways.osm.pbf --overwrite
          osmium export cycleways.osm.pbf --geometry-types=linestring \
            -o cycleways_raw.geojson --overwrite

          osmium tags-filter brussels.osm.pbf w/highway=track \
            -o tracks.osm.pbf --overwrite
          osmium export tracks.osm.pbf --geometry-types=linestring \
            -o tracks_raw.geojson --overwrite

      - name: Filter routing features
        run: |
          osmium tags-filter brussels.osm.pbf \
            ${{ env.HIGHWAY_TYPES_ROUTING }} \
            -o routing_raw.osm.pbf --overwrite

      - name: Convert routing PBF to OSM XML
        run: |
          osmium cat routing_raw.osm.pbf -o routing_raw.osm --overwrite

      - name: Compute pedestrian routing flows
        env:
          PYTHONPATH: scripts
        run: python3 scripts/main.py

      - name: List generated files (debug)
        if: always()
        run: |
          echo "=== Files in workspace ==="
          ls -lh *.geojson stats.json graph.json 2>/dev/null || echo "No files found"

      - name: Upload GeoJSON artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: geojson-outputs
          path: |
            flow_edges.geojson
            forced_segments.geojson
            forced_cycleway.geojson
            street_scores.geojson
            sidewalk_gaps.geojson
            sidewalk_roads.geojson
            sidewalk_roads_raw.geojson
            sidewalk_footways_raw.geojson
            service_roads_raw.geojson
            cycleways_raw.geojson
            tracks_raw.geojson
            missing_crossings.geojson
            highways.geojson
            addresses.geojson
            stats.json
            graph.json
          retention-days: 30
          if-no-files-found: warn

      # ── Build PMTiles in two passes ─────────────────────────────────────
      # The main archive uses --drop-densest-as-needed which silently
      # removes features at low zoom when a tile gets too dense.  For the
      # missing_crossings QA layer we want EVERY point at EVERY zoom
      # ≥ MIN_ZOOM with no exceptions.  Build it separately, then merge
      # with tile-join — the points then survive any density pressure
      # from the other layers.

      - name: Build main PMTiles (without missing_crossings)
        run: |
          tippecanoe \
            -o main.pmtiles \
            --force \
            --name "Brussels Pedestrian Network" \
            --attribution "© OpenStreetMap contributors" \
            -Z${{ env.MIN_ZOOM }} -z${{ env.MAX_ZOOM }} \
            --extend-zooms-if-still-dropping \
            --drop-densest-as-needed \
            --named-layer=highways:highways.geojson \
            --named-layer=flow_edges:flow_edges.geojson \
            --named-layer=street_scores:street_scores.geojson \
            --named-layer=sidewalk_gaps:sidewalk_gaps.geojson \
            --named-layer=sidewalk_roads:sidewalk_roads.geojson

      - name: Build missing_crossings PMTiles (preserve every point)
        run: |
          tippecanoe \
            -o missing_crossings.pmtiles \
            --force \
            -Z${{ env.MIN_ZOOM }} -z${{ env.MAX_ZOOM }} \
            -B${{ env.MIN_ZOOM }} \
            -r1 \
            --no-tile-size-limit \
            --no-feature-limit \
            --named-layer=missing_crossings:missing_crossings.geojson

      - name: Merge into single PMTiles archive
        run: |
          tile-join \
            -o pedestrian.pmtiles \
            --force \
            --name "Brussels Pedestrian Network" \
            --attribution "© OpenStreetMap contributors" \
            main.pmtiles \
            missing_crossings.pmtiles
          ls -lh main.pmtiles missing_crossings.pmtiles pedestrian.pmtiles

      - name: Add build timestamp to state.txt
        run: echo "build_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> state.txt

      # ── Ensure history.json is present ──────────────────────────────────
      # history.json is the canonical historical dataset, normally committed
      # to `main` by "Compute History" but may also be present/updated on
      # other branches (e.g. when testing from a feature branch).  We use
      # whatever is in this checkout, falling back to an empty placeholder
      # only if the file is missing or invalid.
      - name: Ensure history.json is present
        run: |
          if [[ -f history.json ]] && jq empty history.json 2>/dev/null; then
            echo "Using history.json from current checkout ($(jq 'length' history.json) entries)"
          else
            echo "No valid history.json in this checkout — using empty placeholder."
            echo '[]' > history.json
          fi

      # ── Keep sitemap.xml lastmod dates fresh ─────────────────────────────
      # All pages are effectively regenerated on every run (new PMTiles,
      # stats.json, history.json), so a single build-date lastmod accurately
      # reflects "data available at this URL was last updated on this date".
      # Only the deployed gh-pages copy is touched — sitemap.xml on `main`
      # keeps its original dates.
      - name: Update sitemap lastmod dates
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s#<lastmod>[0-9-]*</lastmod>#<lastmod>${TODAY}</lastmod>#g" sitemap.xml
          echo "sitemap.xml lastmod set to ${TODAY}"

      # ── Prepare the site directory ──────────────────────────────────────
      # Copies all static front-end files plus the freshly-built PMTiles
      # and history.json (sourced from the current checkout, see step above).
      - name: Prepare site
        run: |
          mv pedestrian.pmtiles pedestrian.pmtiles.gz
          mkdir -p _site
          cp index.html stats.html evolution.html about.html robots.txt favicon.svg app.js app.css \
             style.json state.txt sitemap.xml stats.json graph.json \
             pedestrian.pmtiles.gz history.json \
             _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: update pedestrian routing flows"
