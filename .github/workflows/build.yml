name: Build & Deploy PMTiles

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "index.html"
      - "style.json"
  workflow_dispatch:

env:
  HIGHWAY_TYPES: >-
    w/highway=footway
    w/highway=pedestrian
    w/highway=path
    w/highway=living_street
    w/highway=steps
    w/highway=elevator
    w/highway=cycleway
    n/highway=elevator
    n/highway=crossing
    n/amenity=elevator
  OSM_PBF_URL: https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region-latest.osm.pbf
  OSM_STATE_URL: https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region.state.txt
  MIN_ZOOM: 8
  MAX_ZOOM: 19
  SHORT_GAP_MAX: 30
  LONG_GAP_MAX: 150

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install osmium-tool, tippecanoe & jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends osmium-tool tippecanoe jq

      - name: Install Python deps
        run: pip install osmnx geopandas shapely --break-system-packages

      - name: Download OSM PBF
        run: |
          wget -O brussels.osm.pbf "$OSM_PBF_URL"
          wget -O state.txt "$OSM_STATE_URL"

      - name: Filter highway features
        run: |
          osmium tags-filter brussels.osm.pbf \
            ${{ env.HIGHWAY_TYPES }} \
            -o highways_raw.osm.pbf --overwrite
   
      - name: Filter address features
        run: |
          osmium tags-filter brussels.osm.pbf \
            n/addr:housenumber \
            -o addresses_raw.osm.pbf --overwrite
      
      - name: Export addresses GeoJSON
        run: |
          osmium export addresses_raw.osm.pbf \
            --geometry-types=point \
            -o addresses.geojson --overwrite
           
      - name: Convert filtered PBF to OSM XML
        run: |
          osmium cat highways_raw.osm.pbf -o highways_raw.osm --overwrite

      - name: Export highways GeoJSON
        run: |
          osmium export highways_raw.osm.pbf \
            --geometry-types=linestring,point \
            -o highways.geojson --overwrite

      - name: Force elevators visible
        run: |
          jq '(.features[] | select(.properties.highway == "elevator" or .properties.amenity == "elevator")) |= . + {"tippecanoe": {"minzoom": 8}}' \
            highways.geojson > highways_fixed.geojson
          mv highways_fixed.geojson highways.geojson

      - name: Compute network gaps
        run: |
          python3 << 'EOF'
          import os, time
          import xml.etree.ElementTree as ET
          import osmnx as ox
          import geopandas as gpd
          from shapely.geometry import LineString
          from shapely.strtree import STRtree

          SHORT_MAX = int(os.environ.get("SHORT_GAP_MAX", 30))
          LONG_MAX  = int(os.environ.get("LONG_GAP_MAX", 150))
          t0 = time.time()

          print("Nettoyage du XML OSM...")
          tree = ET.parse("highways_raw.osm")
          root = tree.getroot()
          node_ids = {n.get("id") for n in root.findall("node")}
          removed = 0
          for way in root.findall("way"):
              refs = {nd.get("ref") for nd in way.findall("nd")}
              if not refs.issubset(node_ids):
                  root.remove(way)
                  removed += 1
          print(f"Ways supprimés (nœuds manquants): {removed}")
          tree.write("highways_clean.osm")

          print("Chargement du graphe OSM...")
          G = ox.graph_from_xml("highways_clean.osm", retain_all=True, simplify=False)
          G_proj = ox.project_graph(G, to_crs="EPSG:31370")

          nodes, edges = ox.graph_to_gdfs(G_proj)
          print(f"Nœuds: {len(nodes)}, Arêtes: {len(edges)}")

          G_undir = G_proj.to_undirected()
          dead_end_ids = [n for n, d in G_undir.degree() if d == 1]
          dead_ends = nodes.loc[dead_end_ids]
          print(f"Dead-ends trouvés: {len(dead_ends)}")

          edge_list = list(edges.itertuples())
          edge_tree = STRtree([e.geometry for e in edge_list])

          crossing_mask = nodes.get("highway") == "crossing"
          crossings = nodes[crossing_mask] if crossing_mask.any() else gpd.GeoDataFrame()
          crossing_tree = STRtree(list(crossings.geometry)) if len(crossings) else None

          gaps_short, gaps_long = [], []

          for node_id, row in dead_ends.iterrows():
              pt = row.geometry
              best_dist = float("inf")
              target_pt = None

              for c_idx in edge_tree.query(pt.buffer(LONG_MAX)):
                  e = edge_list[c_idx]
                  if node_id in (e.Index[0], e.Index[1]):
                      continue
                  d = pt.distance(e.geometry)
                  if d < best_dist:
                      best_dist = d
                      target_pt = e.geometry.interpolate(e.geometry.project(pt))

              if not (0.1 < best_dist <= LONG_MAX):
                  continue

              to_crossing = 0
              if crossing_tree and best_dist <= SHORT_MAX:
                  if len(crossing_tree.query(pt.buffer(SHORT_MAX))) > 0:
                      to_crossing = 1

              gap = LineString([pt, target_pt])
              props = {"distance_m": round(best_dist, 1), "to_crossing": to_crossing}
              (gaps_short if best_dist <= SHORT_MAX else gaps_long).append(
                  {"geometry": gap, **props}
              )

          def save(features, filename):
              rows = features or [{"geometry": None, "distance_m": 0, "to_crossing": 0}]
              gpd.GeoDataFrame(rows, crs="EPSG:31370").to_crs("EPSG:4326").to_file(
                  filename, driver="GeoJSON"
              )

          save(gaps_short, "gaps_short.geojson")
          save(gaps_long,  "gaps_long.geojson")
          print(f"Gaps courts: {len(gaps_short)}, longs: {len(gaps_long)}")
          print(f"Calcul terminé en {time.time()-t0:.1f}s")
          EOF

      - name: Build PMTiles with tippecanoe
        run: |
          tippecanoe \
            -o pedestrian.pmtiles \
            --force \
            --name "Brussels Pedestrian Network" \
            --attribution "© OpenStreetMap contributors" \
            -Z${{ env.MIN_ZOOM }} -z${{ env.MAX_ZOOM }} \
            --no-feature-limit \
            --no-tile-size-limit \
            --extend-zooms-if-still-dropping \
            --drop-densest-as-needed \
            highways.geojson \
            addresses.geojson \
            gaps_short.geojson \
            gaps_long.geojson

      - name: Prepare site
        run: |
          mv pedestrian.pmtiles pedestrian.pmtiles.gz
          mkdir -p _site
          cp index.html style.json state.txt pedestrian.pmtiles.gz _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: update pedestrian map and network gaps"
