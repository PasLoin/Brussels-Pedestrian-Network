<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brussels Pedestrian Flow Analysis</title>

  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", system-ui, sans-serif; background: #1a1a1a; }
    #map { position: absolute; inset: 0; }

    #header {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(255,255,255,0.96); border-radius: 10px;
      padding: 12px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); max-width: 240px;
    }
    #header h1 { font-size: 14px; font-weight: 700; color: #111; line-height: 1.2; }
    #header .subtitle { font-size: 11px; color: #666; margin-top: 2px; }
    #last-update { font-size: 10px; color: #999; margin-top: 6px; }

    #edit-btn {
      display: flex; align-items: center; gap: 6px; margin-top: 10px;
      width: 100%; padding: 7px 10px; border: none; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      background: #e74c3c; color: #fff;
    }
    #edit-btn:hover:not(.disabled) { background: #c0392b; transform: translateY(-1px); }
    #edit-btn.disabled { background: #ddd; color: #aaa; cursor: not-allowed; pointer-events: none; }
    #edit-btn svg { flex-shrink: 0; }
    #edit-hint { font-size: 10px; color: #aaa; margin-top: 4px; text-align: center; min-height: 14px; }

    #legend {
      position: absolute; bottom: 28px; left: 12px; z-index: 10;
      background: rgba(255,255,255,0.96); border-radius: 10px;
      padding: 12px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 210px; max-height: calc(100vh - 120px); overflow-y: auto;
    }
    #legend h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #444; margin-bottom: 8px; }
    .legend-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #888; margin: 10px 0 4px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; cursor: pointer; user-select: none; }
    .legend-item.hidden { opacity: 0.25; }
    .legend-line { width: 26px; height: 4px; border-radius: 2px; flex-shrink: 0; }
    .legend-line.dashed {
      background: repeating-linear-gradient(to right, var(--c) 0px, var(--c) 6px, transparent 6px, transparent 10px);
    }
    .legend-line.gradient {
      background: linear-gradient(to right, var(--c1), var(--c2));
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.gradient-dot {
      background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 100%);
    }
    .legend-label { font-size: 12px; color: #333; }

    #zoom-badge {
      position: absolute; top: 12px; right: 52px; z-index: 10;
      background: rgba(255,255,255,0.9); border-radius: 6px; padding: 4px 8px;
      font-size: 11px; color: #555; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <h1>🚶 Brussels Pedestrian<br>Simulated Flows</h1>
  <div class="subtitle">Analyse des flux piétons (OSM)</div>
  <div id="last-update">Chargement…</div>
  <a id="edit-btn" class="disabled" href="#" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Éditer dans OSM
  </a>
  <div id="edit-hint">Zoomez au niveau 16+ pour éditer</div>
</div>

<div id="legend"><h2>Légende</h2></div>
<div id="zoom-badge">z<span id="zoom-val">—</span></div>

<script>
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile.bind(protocol));
const PMTILES_URL = new URL("./pedestrian.pmtiles.gz", window.location.href).href;
const EDIT_MIN_ZOOM = 16;

// --- CONFIGURATION GRIS HOMOGÈNE ---
const ROAD_GRAY = "#2a2a2a";
const ROAD_BORDER = "#1a1a1a";

const BASE_STYLE_OVERRIDES = {
  // Coeurs de routes
  "road_motorway":          { "line-color": ROAD_GRAY },
  "road_motorway_link":     { "line-color": ROAD_GRAY },
  "road_trunk_primary":     { "line-color": ROAD_GRAY },
  "road_trunk_primary_link":{ "line-color": ROAD_GRAY },
  "road_secondary_tertiary":{ "line-color": ROAD_GRAY },
  "road_major_rail":        { "line-color": ROAD_BORDER },
  // Casings (bords) pour éviter le noir ou les contrastes
  "road_motorway_casing":   { "line-color": ROAD_BORDER },
  "road_trunk_primary_casing": { "line-color": ROAD_BORDER },
  "road_secondary_tertiary_casing": { "line-color": ROAD_BORDER },
  // Ponts et tunnels
  "bridge_motorway":        { "line-color": ROAD_GRAY },
  "bridge_motorway_casing": { "line-color": ROAD_BORDER },
  "bridge_trunk_primary":   { "line-color": ROAD_GRAY },
  "bridge_trunk_primary_casing": { "line-color": ROAD_BORDER },
  "bridge_secondary_tertiary": { "line-color": ROAD_GRAY },
  "tunnel_motorway":        { "line-color": ROAD_GRAY },
  "tunnel_trunk_primary":   { "line-color": ROAD_GRAY },
};

// ── Réseau de base : TOUT À FALSE (Masqué au démarrage) ──────────────────────
const HIGHWAY_LAYERS = [
  { id: "living_street", label: "Rue partagée",    color: "#16a34a", width: 3,   dash: false, hidden: true },
  { id: "pedestrian",    label: "Zone piétonne",    color: "#15803d", width: 3,   dash: false, hidden: true },
  { id: "footway",       label: "Trottoir / allée", color: "#22c55e", width: 2,   dash: false, hidden: true },
  { id: "cycleway",      label: "Piste cyclable",   color: "#0000ff", width: 2.5, dash: false, hidden: true },
  { id: "path",          label: "Sentier",          color: "#86efac", width: 1.5, dash: true,  hidden: true },
  { id: "steps",         label: "Escaliers",        color: "#166534", width: 2,   dash: true,  hidden: true },
];

const PEDESTRIAN_LAYERS = [
  // ── Base network (Désactivé par défaut) ──────────────────────────────────
  ...HIGHWAY_LAYERS.map(({ id, color, width, dash, hidden }) => ({
    id: `highway-${id}`,
    type: "line",
    source: "pedestrian",
    "source-layer": "highways",
    filter: ["==", ["get", "highway"], id],
    layout: { "line-cap": "round", "line-join": "round", visibility: hidden ? "none" : "visible" },
    paint: {
      "line-color": color,
      "line-width": ["interpolate", ["linear"], ["zoom"], 8, width * 0.4, 14, width, 18, width * 2.5],
      "line-opacity": 0.9,
      ...(dash ? { "line-dasharray": [3, 3] } : {})
    }
  })),

  {
    id: "highway-crossing",
    type: "circle",
    source: "pedestrian",
    "source-layer": "highways",
    filter: ["==", ["get", "highway"], "crossing"],
    layout: { visibility: "none" }, // Masqué au démarrage
    paint: {
      "circle-color": "#15803d",
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 12, 1.5, 16, 4],
      "circle-stroke-color": "#15803d",
      "circle-stroke-width": 1
    }
  },

  // ── ROUTAGE SIMULÉ (ACTIVÉ PAR DÉFAUT) ──────────────────────────────────
  {
    id: "forced-segments",
    type: "line",
    source: "pedestrian",
    "source-layer": "forced_segments",
    layout: { "line-cap": "round", "line-join": "round", visibility: "visible" },
    paint: {
      "line-color": ["match", ["get", "highway"], ["residential", "service"], "#f59e0b", ["unclassified"], "#f97316", ["tertiary", "tertiary_link"], "#ef4444", ["secondary", "secondary_link"], "#dc2626", ["primary", "primary_link"], "#991b1b", "#f97316"],
      "line-width": ["interpolate", ["linear"], ["zoom"], 10, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 1, 100, 4], 16, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 2.5, 100, 12]],
      "line-opacity": 0.88
    }
  },
  {
    id: "forced-cycleway",
    type: "line",
    source: "pedestrian",
    "source-layer": "forced_cycleway",
    layout: { "line-cap": "round", "line-join": "round", visibility: "visible" },
    paint: {
      "line-color": "#7c3aed",
      "line-width": ["interpolate", ["linear"], ["zoom"], 10, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 1, 100, 4], 16, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 2.5, 100, 12]],
      "line-opacity": 0.88
    }
  },
  {
    id: "flow-ped",
    type: "line",
    source: "pedestrian",
    "source-layer": "flow_edges",
    filter: ["==", ["get", "surface_cat"], "pedestrian"],
    layout: { "line-cap": "round", "line-join": "round", visibility: "visible" },
    paint: {
      "line-color": ["interpolate", ["linear"], ["get", "flow_pct"], 0, "#bbf7d0", 50, "#16a34a", 100, "#14532d"],
      "line-width": ["interpolate", ["linear"], ["zoom"], 10, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 0.5, 100, 3], 16, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 1, 100, 8]],
      "line-opacity": 0.85
    }
  },
  {
    id: "flow-cycleway",
    type: "line",
    source: "pedestrian",
    "source-layer": "flow_edges",
    filter: ["==", ["get", "surface_cat"], "cycleway_no_foot"],
    layout: { "line-cap": "round", "line-join": "round", visibility: "visible" },
    paint: {
      "line-color": ["interpolate", ["linear"], ["get", "flow_pct"], 0, "#ede9fe", 50, "#7c3aed", 100, "#3b0764"],
      "line-width": ["interpolate", ["linear"], ["zoom"], 10, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 0.5, 100, 3], 16, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 1, 100, 8]],
      "line-opacity": 0.85
    }
  },
  {
    id: "flow-road",
    type: "line",
    source: "pedestrian",
    "source-layer": "flow_edges",
    filter: ["==", ["get", "surface_cat"], "road"],
    layout: { "line-cap": "round", "line-join": "round", visibility: "visible" },
    paint: {
      "line-color": ["interpolate", ["linear"], ["get", "flow_pct"], 0, "#fed7aa", 50, "#ef4444", 100, "#7f1d1d"],
      "line-width": ["interpolate", ["linear"], ["zoom"], 10, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 0.5, 100, 3], 16, ["interpolate", ["linear"], ["get", "flow_pct"], 0, 1, 100, 8]],
      "line-opacity": 0.8
    }
  },

  {
    id: "street-scores",
    type: "circle",
    source: "pedestrian",
    "source-layer": "street_scores",
    minzoom: 13,
    layout: { visibility: "none" },
    paint: {
      "circle-color": ["interpolate", ["linear"], ["get", "walkability"], 0, "#ef4444", 1, "#22c55e"],
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 13, 5, 16, 10],
      "circle-stroke-color": "#fff", "circle-stroke-width": 1.5
    }
  }
];

fetch("https://tiles.openfreemap.org/styles/liberty")
  .then(r => r.json())
  .then(style => {
    style.layers = style.layers.map(layer => {
      const overrides = BASE_STYLE_OVERRIDES[layer.id];
      if (!overrides) return layer;
      return { ...layer, paint: { ...layer.paint, ...overrides } };
    });
    initMap(style);
  });

function initMap(style) {
  const map = new maplibregl.Map({
    container: "map",
    style,
    center: [4.3517, 50.8503],
    zoom: 12,
    attributionControl: false
  });

  map.on("load", () => {
    map.addSource("pedestrian", { type: "vector", url: `pmtiles://${PMTILES_URL}` });
    PEDESTRIAN_LAYERS.forEach(layer => map.addLayer(layer));

    // -- Légende --
    const legendEl = document.getElementById("legend");
    const addSection = (txt) => { const s = document.createElement("div"); s.className="legend-section"; s.textContent=txt; legendEl.appendChild(s); };
    
    const makeItem = ({ layerId, label, color, color2, swatchType = "line", dashed = false }) => {
      const item = document.createElement("div"); item.className = "legend-item";
      const swatch = document.createElement("div"); swatch.className = `legend-${swatchType}`;
      if (color2) { swatch.classList.add(swatchType==="dot"?"gradient-dot":"gradient"); swatch.style.setProperty("--c1", color); swatch.style.setProperty("--c2", color2); }
      else if (dashed) { swatch.classList.add("dashed"); swatch.style.setProperty("--c", color); }
      else { swatch.style.background = color; }
      const lbl = document.createElement("span"); lbl.className="legend-label"; lbl.textContent=label;
      item.append(swatch, lbl);
      const updateState = () => item.classList.toggle("hidden", map.getLayoutProperty(layerId, "visibility") === "none");
      updateState();
      item.onclick = () => { const v = map.getLayoutProperty(layerId, "visibility") === "none" ? "visible" : "none"; map.setLayoutProperty(layerId, "visibility", v); updateState(); };
      return item;
    };

    addSection("Routage simulé");
    legendEl.appendChild(makeItem({ layerId: "forced-segments", label: "Forcé sur route", color: "#f59e0b", color2: "#991b1b" }));
    legendEl.appendChild(makeItem({ layerId: "forced-cycleway", label: "Forcé sur piste cyclable", color: "#c4b5fd", color2: "#3b0764" }));
    legendEl.appendChild(makeItem({ layerId: "flow-ped", label: "Flux piéton", color: "#bbf7d0", color2: "#14532d" }));
    legendEl.appendChild(makeItem({ layerId: "flow-cycleway", label: "Flux cycleway (no foot)", color: "#ede9fe", color2: "#3b0764" }));
    legendEl.appendChild(makeItem({ layerId: "flow-road", label: "Flux sur route", color: "#fed7aa", color2: "#7f1d1d" }));

    addSection("Réseau de base (Désactivé)");
    HIGHWAY_LAYERS.forEach(l => legendEl.appendChild(makeItem({ layerId: `highway-${l.id}`, label: l.label, color: l.color, dashed: l.dash })));
  });

  map.on("moveend", () => {
    const z = map.getZoom(); const c = map.getCenter();
    document.getElementById("zoom-val").textContent = z.toFixed(1);
    const btn = document.getElementById("edit-btn");
    if (z >= EDIT_MIN_ZOOM) { btn.href = `https://www.openstreetmap.org/edit#map=${Math.round(z)}/${c.lat.toFixed(5)}/${c.lng.toFixed(5)}`; btn.classList.remove("disabled"); }
    else btn.classList.add("disabled");
  });
}
</script>
</body>
</html>
