<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://unpkg.com 'unsafe-inline'; img-src 'self' https://tiles.openfreemap.org https://www.openstreetmap.org data:; connect-src 'self' https://tiles.openfreemap.org https://unpkg.com; worker-src blob:; child-src blob:; font-src https://tiles.openfreemap.org; object-src 'none'; base-uri 'self'; upgrade-insecure-requests;" />
  <meta name="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carte des flux piétons simulés et QA OpenStreetMap — Bruxelles</title>
  <meta name="description" content="Carte des flux piétons simulés à Bruxelles à partir d'OpenStreetMap, avec couches QA pour aider les contributeurs à corriger trottoirs et traversées." />
  <meta property="og:title" content="Carte des flux piétons simulés et QA OpenStreetMap — Bruxelles" />
  <meta property="og:description" content="Carte des flux piétons simulés à Bruxelles à partir d'OpenStreetMap, avec couches QA pour aider les contributeurs à corriger trottoirs et traversées." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pasloin.github.io/Brussels-Pedestrian-Network/" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <link href="./app.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>
</head>
<body>

<div id="map"></div>

<div id="header" class="open">
  <button id="header-toggle" onclick="toggleHeader()" aria-expanded="true" aria-controls="header-content">
    <span>
      <strong>Brussels Pedestrian</strong>
    </span>
    <svg aria-hidden="true" class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
  <div id="header-content">
    <h1>Brussels Pedestrian<br>Simulated Flows</h1>
    <div class="subtitle">Analyse des flux piétons (OSM)</div>
    <div id="osm-date">Chargement…</div>
    <div id="build-date"></div>
    <div id="routing-stats"></div>

    <div class="header-nav">
      <a href="./stats.html">📊 Statistiques</a>
      <a href="./evolution.html">📈 Évolution</a>
      <a href="./about.html">📖 Méthodologie</a>
    </div>

    <!-- ── Flow threshold slider ─────────────────────────────────────────
         Masque les flux sur route dont le flow_pct est inférieur au seuil.
         N'affecte pas les flux piétons ni les flux cycleway.
    ──────────────────────────────────────────────────────────────────── -->
    <div class="flow-filter-wrap">
      <div class="flow-filter-label" id="flow-threshold-label">
        Flux route min : <span id="flow-threshold-val">0 %</span>
      </div>
      <input
        id="flow-threshold-slider" aria-labelledby="flow-threshold-label"
        type="range"
        min="0" max="95" step="5" value="0"
        oninput="updateFlowFilter(this.value)"
      />
    </div>

    <button id="nav-btn" class="header-btn loading" onclick="toggleNavMode()" aria-busy="true" aria-live="polite">
      <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3 11 22 2 13 21 11 13 3 11"/>
      </svg>
      <span id="nav-btn-label">Chargement graphe…</span>
    </button>
    <div id="nav-hint" aria-live="polite"></div>

    <a id="edit-btn" class="header-btn disabled" aria-disabled="true" tabindex="-1" href="#" target="_blank" rel="noopener">
      <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Éditer dans OSM
    </a>
    <div id="edit-hint">Zoomez au niveau 16+ pour éditer</div>
  </div>
</div>

<!-- Route results panel -->
<div id="route-panel">
  <h3>🧭 Itinéraire</h3>
  <div class="route-summary" id="route-dist"></div>
  <div class="route-time" id="route-time"></div>
  <div class="route-bar-container">
    <div class="route-bar">
      <div class="route-bar-seg route-bar-ped" id="bar-ped"></div>
      <div class="route-bar-seg route-bar-road" id="bar-road"></div>
      <div class="route-bar-seg route-bar-cyc" id="bar-cyc"></div>
    </div>
  </div>
  <div class="route-breakdown">
    <div class="route-row">
      <div class="route-dot" style="background:#22c55e"></div>
      <span class="rlabel">Piéton</span>
      <span class="rvalue" id="stat-ped-m"></span>
      <span class="rpct" id="stat-ped-pct"></span>
    </div>
    <div class="route-row">
      <div class="route-dot" style="background:#ef4444"></div>
      <span class="rlabel">Route</span>
      <span class="rvalue" id="stat-road-m"></span>
      <span class="rpct" id="stat-road-pct"></span>
    </div>
    <div class="route-row">
      <div class="route-dot" style="background:#7c3aed"></div>
      <span class="rlabel">Cycleway (no foot)</span>
      <span class="rvalue" id="stat-cyc-m"></span>
      <span class="rpct" id="stat-cyc-pct"></span>
    </div>
  </div>
  <button id="route-clear" onclick="clearRoute()" aria-label="Effacer l'itinéraire">✕ Effacer l'itinéraire</button>
</div>

<div id="legend" class="open">
  <button id="legend-toggle" onclick="toggleLegend()" aria-expanded="true" aria-controls="legend-content">
    <span>Légende</span>
    <svg aria-hidden="true" class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
  <div id="legend-content"></div>
</div>
<div id="zoom-badge">z<span id="zoom-val">—</span></div>

<script src="./app.js"></script>
</body>
</html>
