<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brussels Pedestrian Network</title>

  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", system-ui, sans-serif; background: #1a1a1a; }
    #map { position: absolute; inset: 0; }

    #header {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(255,255,255,0.96); border-radius: 10px;
      padding: 12px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); max-width: 240px;
    }
    #header h1 { font-size: 14px; font-weight: 700; color: #111; line-height: 1.2; }
    #header .subtitle { font-size: 11px; color: #666; margin-top: 2px; }
    #last-update { font-size: 10px; color: #999; margin-top: 6px; }

    #edit-btn {
      display: flex; align-items: center; gap: 6px; margin-top: 10px;
      width: 100%; padding: 7px 10px; border: none; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      background: #e74c3c; color: #fff;
    }
    #edit-btn:hover:not(.disabled) { background: #c0392b; transform: translateY(-1px); }
    #edit-btn.disabled { background: #ddd; color: #aaa; cursor: not-allowed; pointer-events: none; }
    #edit-btn svg { flex-shrink: 0; }
    #edit-hint { font-size: 10px; color: #aaa; margin-top: 4px; text-align: center; min-height: 14px; }

    #legend {
      position: absolute; bottom: 28px; left: 12px; z-index: 10;
      background: rgba(255,255,255,0.96); border-radius: 10px;
      padding: 12px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 190px; max-height: calc(100vh - 120px); overflow-y: auto;
    }
    #legend h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #444; margin-bottom: 8px; }
    .legend-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #888; margin: 10px 0 4px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; cursor: pointer; user-select: none; }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-item.hidden { opacity: 0.25; }
    .legend-line { width: 26px; height: 4px; border-radius: 2px; flex-shrink: 0; }
    .legend-line.dashed {
      background: repeating-linear-gradient(to right, var(--c) 0px, var(--c) 6px, transparent 6px, transparent 10px);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 12px; color: #333; }

    #zoom-badge {
      position: absolute; top: 12px; right: 52px; z-index: 10;
      background: rgba(255,255,255,0.9); border-radius: 6px; padding: 4px 8px;
      font-size: 11px; color: #555; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="header">
  <h1>🚶 Brussels Pedestrian<br>Network</h1>
  <div class="subtitle">OSM · vector tiles</div>
  <div id="last-update">Chargement…</div>
  <a id="edit-btn" class="disabled" href="#" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Éditer dans OSM
  </a>
  <div id="edit-hint">Zoomez au niveau 16+ pour éditer</div>
</div>

<div id="legend"><h2>Légende</h2></div>
<div id="zoom-badge">z<span id="zoom-val">—</span></div>

<script>
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile.bind(protocol));
const PMTILES_URL = new URL("./pedestrian.pmtiles.gz", window.location.href).href;
const EDIT_MIN_ZOOM = 16;

const BASE_STYLE_OVERRIDES = {
  "road_secondary_tertiary": { "line-color": "rgba(248,170,255,1)" },
  "road_trunk_primary":      { "line-color": "rgba(113,14,109,1)" },
  "road_motorway_casing":    { "line-color": "rgba(119,4,6,1)" },
  "road_motorway_link":      { "line-color": "rgba(8,7,7,1)" },
  "road_motorway":           { "line-color": "#000" },
  "bridge_trunk_primary":    { "line-color": "rgba(247,4,4,1)" },
  "bridge_motorway":         { "line-color": "rgba(255,1,1,1)" },
  "bridge_motorway_link":    { "line-color": "rgba(26,25,24,1)" },
  "tunnel_trunk_primary":    { "line-color": "rgba(18,18,17,1)" },
};

const HIGHWAY_LAYERS = [
  { id: "living_street", label: "Rue partagée",     color: "#16a34a", width: 3,   dash: false, hidden: false },
  { id: "pedestrian",    label: "Zone piétonne",    color: "#15803d", width: 3,   dash: false, hidden: false },
  { id: "footway",       label: "Trottoir / allée", color: "#22c55e", width: 2,   dash: false, hidden: false },
  { id: "cycleway",      label: "Piste cyclable",   color: "#0000ff", width: 2.5, dash: false, hidden: true  },
  { id: "path",          label: "Sentier",          color: "#86efac", width: 1.5, dash: true,  hidden: false },
  { id: "steps",         label: "Escaliers",        color: "#166534", width: 2,   dash: true,  hidden: false },
];

const PEDESTRIAN_LAYERS = [
  ...HIGHWAY_LAYERS.map(({ id, color, width, dash, hidden }) => ({
    id: `highway-${id}`,
    type: "line",
    source: "pedestrian",
    "source-layer": "highways",
    filter: ["==", ["get", "highway"], id],
    layout: {
      "line-cap": "round",
      "line-join": "round",
      visibility: hidden ? "none" : "visible"
    },
    paint: {
      "line-color": color,
      "line-width": ["interpolate", ["linear"], ["zoom"], 8, width * 0.4, 14, width, 18, width * 2.5],
      "line-opacity": 0.9,
      ...(dash ? { "line-dasharray": [3, 3] } : {})
    }
  })),
  {
    id: "highway-crossing",
    type: "circle",
    source: "pedestrian",
    "source-layer": "highways",
    filter: ["==", ["get", "highway"], "crossing"],
    layout: { visibility: "visible" },
    paint: {
      "circle-color": "#15803d",
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 12, 1.5, 16, 4, 18, 8],
      "circle-stroke-color": "#15803d",
      "circle-stroke-width": ["interpolate", ["linear"], ["zoom"], 12, 1, 16, 2]
    }
  },
  {
    id: "highway-elevator",
    type: "circle",
    source: "pedestrian",
    "source-layer": "highways",
    filter: ["any", ["==", ["get", "highway"], "elevator"], ["==", ["get", "amenity"], "elevator"]],
    layout: { visibility: "visible" },
    paint: {
      "circle-color": "#14532d",
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 8, 2, 16, 6],
      "circle-stroke-color": "#fff",
      "circle-stroke-width": 1.5
    }
  },
  {
    id: "gaps-long",
    type: "line",
    source: "pedestrian",
    "source-layer": "gaps_long",
    layout: { "line-cap": "round", visibility: "none" },
    paint: { "line-color": "#fb923c", "line-width": 2, "line-dasharray": [4, 3], "line-opacity": 0.85 }
  },
  {
    id: "gaps-short",
    type: "line",
    source: "pedestrian",
    "source-layer": "gaps_short",
    layout: { "line-cap": "round", visibility: "none" },
    paint: { "line-color": "#ef4444", "line-width": 2.5, "line-dasharray": [3, 2], "line-opacity": 0.9 }
  },
  {
    id: "housenumbers",
    type: "symbol",
    source: "pedestrian",
    "source-layer": "addresses",
    minzoom: 16,
    layout: {
      "text-field": ["get", "addr:housenumber"],
      "text-size": 11,
      "text-font": ["Noto Sans Regular"],
      "text-allow-overlap": false,
      visibility: "visible"
    },
    paint: {
      "text-color": "#444",
      "text-halo-color": "#fff",
      "text-halo-width": 1
    }
  }
];

fetch("https://tiles.openfreemap.org/styles/liberty")
  .then(r => r.json())
  .then(style => {
    style.layers = style.layers.map(layer => {
      const overrides = BASE_STYLE_OVERRIDES[layer.id];
      if (!overrides) return layer;
      return { ...layer, paint: { ...layer.paint, ...overrides } };
    });
    initMap(style);
  })
  .catch(() => initMap("https://tiles.openfreemap.org/styles/liberty"));

function initMap(style) {
  const map = new maplibregl.Map({
    container: "map",
    style,
    center: [4.3517, 50.8503],
    zoom: 12,
    minZoom: 8,
    maxZoom: 19,
    attributionControl: false
  });

  map.addControl(new maplibregl.NavigationControl(), "top-right");
  map.addControl(new maplibregl.ScaleControl({ maxWidth: 120, unit: "metric" }), "bottom-right");
  map.addControl(new maplibregl.AttributionControl({ compact: false }), "bottom-right");

  map.on("load", () => {
    map.addSource("pedestrian", {
      type: "vector",
      url: `pmtiles://${PMTILES_URL}`
    });

    PEDESTRIAN_LAYERS.forEach(layer => map.addLayer(layer));

    ["gaps-short", "gaps-long"].forEach(layerId => {
      map.on("click", layerId, e => {
        new maplibregl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(`<strong>Gap</strong><br>${e.features[0].properties.distance_m} m`)
          .addTo(map);
      });
      map.on("mouseenter", layerId, () => map.getCanvas().style.cursor = "pointer");
      map.on("mouseleave", layerId, () => map.getCanvas().style.cursor = "");
    });

    const legendEl = document.getElementById("legend");

    function addSection(label) {
      const s = document.createElement("div");
      s.className = "legend-section";
      s.textContent = label;
      legendEl.appendChild(s);
    }

    function makeLegendItem({ layerId, label, color, swatchType = "line", dashed = false }) {
      const item = document.createElement("div");
      item.className = "legend-item";

      const swatch = document.createElement("div");
      swatch.className = `legend-${swatchType}`;
      if (dashed) {
        swatch.classList.add("dashed");
        swatch.style.setProperty("--c", color);
      } else {
        swatch.style.background = color;
        if (swatchType === "dot" && label === "Passage piéton") swatch.style.border = "1.5px solid #15803d";
      }

      const lbl = document.createElement("span");
      lbl.className = "legend-label";
      lbl.textContent = label;

      item.appendChild(swatch);
      item.appendChild(lbl);

      const initialVis = map.getLayoutProperty(layerId, "visibility");
      item.classList.toggle("hidden", initialVis === "none");

      item.onclick = () => {
        const vis = map.getLayoutProperty(layerId, "visibility") === "none" ? "visible" : "none";
        map.setLayoutProperty(layerId, "visibility", vis);
        item.classList.toggle("hidden", vis === "none");
      };
      return item;
    }

    addSection("Réseau");
    HIGHWAY_LAYERS.forEach(l => legendEl.appendChild(makeLegendItem({
      layerId: `highway-${l.id}`, label: l.label, color: l.color, dashed: l.dash
    })));
    legendEl.appendChild(makeLegendItem({ layerId: "highway-crossing", label: "Passage piéton", color: "#fff", swatchType: "dot" }));
    legendEl.appendChild(makeLegendItem({ layerId: "highway-elevator", label: "Ascenseur",      color: "#14532d", swatchType: "dot" }));

    addSection("Gaps");
    legendEl.appendChild(makeLegendItem({ layerId: "gaps-short", label: "Court < 30m",  color: "#ef4444", dashed: true }));
    legendEl.appendChild(makeLegendItem({ layerId: "gaps-long",  label: "Long < 150m", color: "#fb923c", dashed: true }));

    addSection("Adresses");
    legendEl.appendChild(makeLegendItem({ layerId: "housenumbers", label: "Numéros", color: "#444", swatchType: "dot" }));
  });

  const editBtn  = document.getElementById("edit-btn");
  const editHint = document.getElementById("edit-hint");

  function updateEditButton() {
    const zoom = map.getZoom();
    const center = map.getCenter();
    if (zoom >= EDIT_MIN_ZOOM) {
      editBtn.href = `https://www.openstreetmap.org/edit#map=${Math.round(zoom)}/${center.lat.toFixed(5)}/${center.lng.toFixed(5)}`;
      editBtn.classList.remove("disabled");
      editHint.textContent = "";
    } else {
      editBtn.classList.add("disabled");
      editHint.textContent = `Zoomez encore ${Math.ceil(EDIT_MIN_ZOOM - zoom)} niveau(x) pour éditer`;
    }
    document.getElementById("zoom-val").textContent = zoom.toFixed(1);
  }

  map.on("moveend", updateEditButton);

  fetch("./state.txt").then(r => r.text()).then(txt => {
    const m = txt.match(/timestamp=(.+)/);
    if (m) document.getElementById("last-update").textContent = "Données : " + new Date(m[1].trim().replace(/\\:/g, ":")).toLocaleDateString("fr-BE");
  }).catch(() => {});
}
</script>
</body>
</html>
